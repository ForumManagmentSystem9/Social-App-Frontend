<header class="fixed top-0 left-0 right-0 h-16 bg-sidebar! text-foreground z-50">

  <div class="h-full px-6 flex items-center justify-between">

    <!-- LEFT: LOGO + NAME -->
    <div class="flex items-center gap-3">
      <button class="md:hidden p-2 rounded-lg hover:bg-white/10 transition">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="flex items-center gap-2">
        <mat-icon class="text-xl">bolt</mat-icon>
        <span class="font-semibold text-lg">SocialApp</span>
      </div>
    </div>

    <!-- CENTER: SEARCH -->
    <div class="hidden md:flex flex-1 justify-center px-6">
      <div class="w-full max-w-md relative">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40">search</mat-icon>
        <input
          type="text"
          placeholder="Search..."
          class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />
      </div>
    </div>

    <!-- RIGHT: USER ICON -->
    <div class="flex items-center gap-4">
      <button class="hidden md:flex p-2 rounded-lg hover:bg-white/10 transition">
        <mat-icon>notifications</mat-icon>
      </button>

      <img
        src="https://i.pravatar.cc/150?img=1"
        class="w-9 h-9 rounded-full object-cover cursor-pointer hover:scale-105 transition"
        alt="user"
      />
    </div>

  </div>

</header>
