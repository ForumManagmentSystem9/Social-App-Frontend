<nav
  class="fixed top-0 left-0 right-0 h-16 bg-black border-zinc-800 z-50
         flex items-center justify-between px-6">

  <!-- LEFT : LOGO -->
  <div class="flex items-center gap-3 shrink-0">
    <div
      class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 via-blue-500 to-purple-600
             flex items-center justify-center text-2xl font-black shadow-lg shadow-blue-500/50">
      S
    </div>

    <span
      class="text-xl font-black bg-gradient-to-r from-cyan-400 to-purple-500
             bg-clip-text text-transparent">
      Social
    </span>
  </div>

  <!-- CENTER : SEARCH -->
  <div class="hidden md:flex flex-1 max-w-xl mx-8">
    <div class="relative w-full group">

      <i
        class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2
               text-zinc-500 group-focus-within:text-cyan-400 transition-colors">
      </i>

      <input
        pInputText
        type="text"
        placeholder="Search"
        class="w-full !bg-zinc-900 !border-zinc-800 !text-white
               !rounded-2xl !py-3 !pl-12 !pr-4
               !shadow-none focus:!border-cyan-500
               focus:!ring-0 transition-all duration-200" />

    </div>
  </div>

  <!-- RIGHT : ACTIONS -->
  <div class="flex items-center gap-3 shrink-0">

    <!-- MOBILE SEARCH -->
    <button
      pButton
      icon="pi pi-search"
      class="md:hidden !w-10 !h-10 !rounded-full
             !text-zinc-400 hover:!text-white
             hover:!bg-zinc-900 !border-none !shadow-none">
    </button>

    <!-- NOTIFICATION -->
    <button
      pButton
      icon="pi pi-bell"
      class="relative !w-10 !h-10 !rounded-full
             !text-zinc-400 hover:!text-white
             hover:!bg-zinc-900 !border-none !shadow-none">

      <span
        class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse">
      </span>

    </button>

    <!-- AVATAR -->
    <p-avatar
      label="JD"
      shape="circle"
      styleClass="w-10 h-10 cursor-pointer font-bold
                  bg-gradient-to-br from-pink-500 to-orange-500
                  text-white shadow-lg shadow-pink-500/30
                  hover:ring-2 hover:ring-cyan-500 transition-all">
    </p-avatar>

    <!-- MOBILE MENU -->
    <button
      pButton
      icon="pi pi-bars"
      (click)="toggleMenu()"
      class="lg:hidden !w-10 !h-10 !rounded-full
         !text-zinc-400 hover:!text-white
         hover:!bg-zinc-900 !border-none !shadow-none">
    </button>


  </div>

</nav>
