<nav class="fixed top-0 left-0 right-0 h-16 bg-black border-b border-zinc-800 z-50
            flex items-center justify-between px-6">

  <!-- LEFT: LOGO -->
  <div class="flex items-center gap-3 shrink-0">
    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 via-blue-500 to-purple-600
                flex items-center justify-center text-2xl font-black shadow-lg shadow-blue-500/50">
      S
    </div>
    <span class="text-xl font-black bg-gradient-to-r from-cyan-400 to-purple-500
                 bg-clip-text text-transparent">
      Social
    </span>
  </div>

  <!-- CENTER: DESKTOP SEARCH -->
  <div class="hidden md:flex flex-1 max-w-xl mx-8">
    <div class="relative w-full group">

      <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2
                text-zinc-500 group-focus-within:text-cyan-400
                transition-colors z-10 pointer-events-none text-sm">
      </i>

      <p-autoComplete
        [(ngModel)]="searchValue"
        [suggestions]="filteredGroups"
        [group]="true"
        (completeMethod)="filterSearch($event)"
        (onSelect)="onSelect($event)"
        placeholder="Search tags, members, posts..."
        styleClass="!w-full !block
                    [&_.p-autocomplete]:!w-full
                    [&_.p-autocomplete]:!block
                    [&_.p-autocomplete-input]:!w-full
                    [&_.p-autocomplete-input]:!bg-zinc-900
                    [&_.p-autocomplete-input]:!border
                    [&_.p-autocomplete-input]:!border-zinc-800
                    [&_.p-autocomplete-input]:!text-white
                    [&_.p-autocomplete-input]:!rounded-2xl
                    [&_.p-autocomplete-input]:!pl-10
                    [&_.p-autocomplete-input]:!pr-4
                    [&_.p-autocomplete-input]:!py-3
                    [&_.p-autocomplete-input]:!h-[44px]
                    [&_.p-autocomplete-input]:!text-sm
                    [&_.p-autocomplete-input]:!shadow-none
                    [&_.p-autocomplete-input]:!outline-none
                    [&_.p-autocomplete-input]:!caret-cyan-400
                    [&_.p-autocomplete-input:focus]:!border-cyan-500
                    [&_.p-autocomplete-input:focus]:!ring-2
                    [&_.p-autocomplete-input:focus]:!ring-cyan-500/20
                    [&_.p-autocomplete-input::placeholder]:!text-zinc-600
                    [&_.p-autocomplete-dropdown]:!hidden"
        [panelStyleClass]="desktopPanelClass"
      >
        <ng-template let-group pTemplate="group">
          <div class="flex items-center gap-2 px-3 py-2 border-b border-zinc-800/80">
            <span class="text-cyan-400 text-[0.6rem] font-bold uppercase tracking-widest">
              {{ group.label }}
            </span>
          </div>
        </ng-template>

        <ng-template let-item pTemplate="item">
          <ng-container
            [ngTemplateOutlet]="itemTemplate"
            [ngTemplateOutletContext]="{ $implicit: item }">
          </ng-container>
        </ng-template>

      </p-autoComplete>
    </div>
  </div>

  <!-- RIGHT: ACTIONS -->
  <div class="flex items-center gap-3 shrink-0">

    @if (sidebar.screenIsMobile) {
      <button
        pButton
        icon="pi pi-search"
        (click)="toggleMobileSearch()"
        class="md:hidden !w-10 !h-10 !rounded-full !bg-transparent
               !text-zinc-400 hover:!text-white hover:!bg-zinc-900
               !border-none !shadow-none transition-colors">
      </button>
    }

    <button
      pButton
      icon="pi pi-bell"
      class="relative !w-10 !h-10 !rounded-full !bg-transparent
             !text-zinc-400 hover:!text-white hover:!bg-zinc-900
             !border-none !shadow-none transition-colors">
      <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
    </button>

    <p-avatar
      label="AT"
      shape="circle"
      styleClass="!w-10 !h-10 cursor-pointer font-bold
                  bg-gradient-to-br from-pink-500 to-orange-500
                  text-white shadow-lg shadow-pink-500/30
                  hover:ring-2 hover:ring-cyan-500 transition-all">
    </p-avatar>

    @if (sidebar.screenIsMobile) {
      <button
        pButton
        icon="pi pi-bars"
        (click)="toggleMenu()"
        class="lg:hidden !w-10 !h-10 !rounded-full !bg-transparent
               !text-zinc-400 hover:!text-white hover:!bg-zinc-900
               !border-none !shadow-none transition-colors">
      </button>
    }

  </div>
</nav>

<!-- MOBILE SEARCH OVERLAY -->
@if (showMobileSearch && sidebar.screenIsMobile) {
  <div
    class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[9999] flex flex-col pt-20 px-5"
    (click)="toggleMobileSearch()">

    <div class="w-full" (click)="$event.stopPropagation()">

      <h2 class="text-white text-lg font-bold mb-5 tracking-tight">
        Search by tags, members, posts
      </h2>

      <div class="relative w-full">

        <i class="pi pi-search absolute left-4 top-[26px] -translate-y-1/2
                  text-zinc-500 z-10 pointer-events-none text-sm">
        </i>

        <p-autoComplete
          [(ngModel)]="searchValue"
          [suggestions]="filteredGroups"
          [group]="true"
          (completeMethod)="filterSearch($event)"
          (onSelect)="onSelect($event)"
          placeholder="Search..."
          styleClass="!w-full !block
                      [&_.p-autocomplete]:!w-full
                      [&_.p-autocomplete]:!block
                      [&_.p-autocomplete-input]:!w-full
                      [&_.p-autocomplete-input]:!bg-zinc-900
                      [&_.p-autocomplete-input]:!border
                      [&_.p-autocomplete-input]:!border-zinc-700
                      [&_.p-autocomplete-input]:!text-white
                      [&_.p-autocomplete-input]:!rounded-2xl
                      [&_.p-autocomplete-input]:!pl-10
                      [&_.p-autocomplete-input]:!pr-4
                      [&_.p-autocomplete-input]:!py-3
                      [&_.p-autocomplete-input]:!h-[52px]
                      [&_.p-autocomplete-input]:!text-base
                      [&_.p-autocomplete-input]:!shadow-none
                      [&_.p-autocomplete-input]:!outline-none
                      [&_.p-autocomplete-input]:!caret-cyan-400
                      [&_.p-autocomplete-input:focus]:!border-cyan-500
                      [&_.p-autocomplete-input:focus]:!ring-2
                      [&_.p-autocomplete-input:focus]:!ring-cyan-500/20
                      [&_.p-autocomplete-input::placeholder]:!text-zinc-600
                      [&_.p-autocomplete-dropdown]:!hidden"
          [panelStyleClass]="mobilePanelClass"
        >
          <ng-template let-group pTemplate="group">
            <div class="flex items-center gap-2 px-3 py-2 border-b border-zinc-800/80">
              <span class="text-cyan-400 text-[0.6rem] font-bold uppercase tracking-widest">
                {{ group.label }}
              </span>
            </div>
          </ng-template>

          <ng-template let-item pTemplate="item">
            <ng-container
              [ngTemplateOutlet]="itemTemplate"
              [ngTemplateOutletContext]="{ $implicit: item }">
            </ng-container>
          </ng-template>

        </p-autoComplete>
      </div>
    </div>
  </div>
}

<!-- SHARED ITEM TEMPLATE -->
<ng-template #itemTemplate let-item>
  <div class="flex items-center justify-between px-3 py-2 rounded-xl cursor-pointer">

    <div class="flex items-center gap-3">

      <!-- ICON BADGE -->
      <div [ngClass]="[
             'w-8 h-8 flex items-center justify-center shrink-0',
             getItemIcon(item.type).bg,
             getItemIcon(item.type).shape
           ]">
        <i [ngClass]="['pi text-xs',
                        getItemIcon(item.type).icon,
                        getItemIcon(item.type).color]">
        </i>
      </div>

      <!-- LABEL + SUBTITLE -->
      <div class="flex flex-col">
        <span class="text-zinc-100 text-sm leading-tight">{{ item.label }}</span>
        <span class="text-zinc-600 text-[0.65rem] capitalize">{{ item.type }}</span>
      </div>

    </div>

    <i class="pi pi-angle-right text-zinc-700 text-xs"></i>
  </div>
</ng-template>
