<aside
  class="fixed right-0 top-16 w-80 h-[calc(100vh-4rem)]
         bg-black border-l border-zinc-800 p-6 overflow-y-auto">

  <!-- SEARCH -->
  <div class="mb-6">
    <div class="relative group">

      <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>

      <input
        pInputText
        placeholder="Search"
        class="w-full !bg-zinc-900 !border-zinc-800 !text-white
               !rounded-2xl !py-3.5 !pl-12 !pr-4
               !shadow-none focus:!border-cyan-500">
    </div>
  </div>

  <!-- ❤️ ACTIVITY / LIKES -->
  <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800 mb-6">

    <h2 class="text-xl font-black mb-4">Activity ❤️</h2>

    <div class="space-y-3">

      <div
        *ngFor="let like of likes"
        class="flex items-center gap-3 p-2 rounded-xl hover:bg-zinc-800/50 transition">

        <p-avatar
          [label]="like.avatar"
          shape="circle"
          styleClass="bg-gradient-to-br from-pink-500 to-purple-600 text-white">
        </p-avatar>

        <div class="flex-1 text-sm">
          <span class="font-bold text-white">{{ like.user }}</span>
          <span class="text-zinc-400"> {{ like.action }}</span>
          <div class="text-xs text-zinc-500">{{ like.time }}</div>
        </div>

      </div>

    </div>

  </div>

  <!-- 👥 FRIEND REQUESTS -->
  <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800 mb-6">

    <h2 class="text-xl font-black mb-4">Friend Requests 👥</h2>

    <div class="space-y-4">

      <div
        *ngFor="let req of friendRequests"
        class="flex items-center gap-3">

        <p-avatar
          [label]="req.avatar"
          shape="circle"
          styleClass="bg-gradient-to-br from-cyan-500 to-blue-600 text-white">
        </p-avatar>

        <div class="flex-1">
          <div class="font-bold text-sm text-white">{{ req.name }}</div>
          <div class="text-xs text-zinc-500">{{ req.mutual }} mutual friends</div>
        </div>

        <div class="flex gap-2">
          <button
            pButton
            icon="pi pi-check"
            class="!bg-cyan-500 !border-none !rounded-full !w-8 !h-8">
          </button>

          <button
            pButton
            icon="pi pi-times"
            class="!bg-zinc-700 !border-none !rounded-full !w-8 !h-8">
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- 💬 CONTACTS -->
  <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800">

    <h2 class="text-xl font-black mb-4">Contacts 💬</h2>

    <div class="space-y-3">

      <div
        *ngFor="let contact of contacts"
        class="flex items-center gap-3 p-2 rounded-xl hover:bg-zinc-800/50 transition">

        <p-avatar
          [label]="contact.avatar"
          shape="circle"
          styleClass="bg-zinc-700 text-white">
        </p-avatar>

        <div class="flex-1">
          <div class="font-bold text-sm text-white">{{ contact.name }}</div>
          <div class="text-xs text-zinc-500 capitalize">{{ contact.status }}</div>
        </div>

      </div>

    </div>

  </div>

</aside>
