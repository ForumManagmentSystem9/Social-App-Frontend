<!-- MOBILE BACKDROP (starts below main nav) -->
@if (sidebar.sidebarVisible) {
  <div
    class="fixed left-0 right-0 bottom-0 bg-black/50 z-40 lg:hidden transition-opacity top-16"
    (click)="sidebar.sidebarVisible = false"
  ></div>
}

<!-- SIDEBAR (starts below main nav) -->
<aside
  class="fixed left-0 bottom-0 h-[calc(100vh-4rem)] z-50
         bg-black w-xs
         transform transition-transform duration-300
         lg:translate-x-0 flex flex-col top-16 py-4!"
  [ngClass]="{
    '-translate-x-full': !sidebar.sidebarVisible,
    'translate-x-0': sidebar.sidebarVisible
  }"
>

  <!-- NAVIGATION -->
  <nav class="flex-1 overflow-y-auto py-2 px-3 space-y-1">

    @for (item of navItems; track item.id) {
      <button
        (click)="activeNav = item.id"
        class="relative w-full flex items-center gap-3 px-4 py-3 rounded-2xl
               border-none shadow-none transition-all duration-200 group overflow-hidden"
        [ngClass]="activeNav === item.id
          ? 'bg-linear-to-r from-cyan-500/20 to-purple-500/20 text-white'
          : 'bg-transparent text-zinc-400 hover:bg-zinc-900 hover:text-white'"
      >

        <!-- ACTIVE INDICATOR -->
        <div
          class="absolute left-0 top-0 h-full w-1 rounded-full transition-all duration-300"
          [ngClass]="{
            'bg-gradient-to-b from-cyan-400 to-purple-500': activeNav === item.id,
            'bg-transparent group-hover:bg-zinc-700/40': activeNav !== item.id
          }"
        ></div>

        <!-- ICON -->
        <span class="text-xl relative z-10">
          <i [class]="item.icon"></i>
        </span>

        <!-- LABEL + BADGE -->
        @if (isExpanded) {
          <span class="font-bold text-base relative z-10">
            {{ item.label }}
          </span>

          @if (item.badge) {
            <span
              class="ml-auto bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-full"
            >
              {{ item.badge }}
            </span>
          }
        }

      </button>
    }

  </nav>

  <!-- CREATE POST -->
  @if (isExpanded) {
    <div class="w-full px-3 mx-auto">
      <button
        class="w-full my-3 p-3 rounded-2xl border-none
             font-black text-lg text-white
             bg-linear-to-r from-cyan-500 via-blue-500 to-purple-600
             hover:scale-105 active:scale-95 transition-all duration-200"
      >
        Create Post
      </button>
    </div>
  }

  <!-- FOOTER -->
  <div class="border-t border-zinc-800 p-3 mt-auto">
    <button
      class="w-full flex items-center gap-3 px-3 py-3 rounded-2xl
             hover:bg-zinc-900 transition-all duration-200"
    >
      <div
        class="w-10 h-10 rounded-full flex items-center justify-center
               bg-gradient-to-br from-pink-500 to-orange-500 text-white font-bold"
      >
        JD
      </div>

      @if (isExpanded) {
        <div class="flex-1 text-left">
          <div class="font-bold text-sm text-white">John Doe</div>
          <div class="text-xs text-zinc-500">@johndoe</div>
        </div>
      }
    </button>
  </div>

</aside>
