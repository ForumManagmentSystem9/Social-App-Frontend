<mat-card class="bg-card! w-full my-4! rounded-2xl! p-0! overflow-hidden">
  <article class="flex items-center gap-3 p-4!">
    <img
      mat-card-avatar
      class="w-11 h-11 rounded-full m-0!"
      [src]="avatar().url"
      alt="Avatar"
    />
    <!-- Input field -->
    <div class="flex-1">
      <input
        type="text"
        placeholder="What's on your mind?"
        class="w-full p-3 bg-input! rounded-full border-none outline-none text-foreground! hover:bg-gray-200 focus:ring-2 focus:ring-green-300 transition-all"
      />
    </div>

    <!-- Post button (or Search icon if you prefer) -->
    <button
      class="flex items-center justify-center w-11 h-11 text-foreground! rounded-full"
      title="Post"
    >
      <mat-icon>send</mat-icon>
    </button>
  </article>
</mat-card>
