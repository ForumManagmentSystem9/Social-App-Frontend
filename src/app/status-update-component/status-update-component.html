<p-card class="bg-card! w-full my-4 rounded-2xl! p-1 overflow-hidden">

  <div class="flex items-center gap-3 p-4">

    <!-- Avatar -->
    <p-avatar
      [image]="avatar().url"
      shape="circle"
      class="w-10! h-10!"
    ></p-avatar>

    <!-- Input -->
    <div class="flex-1">
      <input
        type="text"
        placeholder="What's on your mind?"
        class="w-full p-3 bg-input rounded-full border-none outline-none text-foreground
               focus:ring-2 focus:ring-green-300 transition-all"
      />
    </div>

    <!-- Send Button -->
    <button
      class="flex items-center justify-center w-11 h-11 rounded-full
         cursor-pointer"
      title="Post"
    >
      <mat-icon class="text-muted-foreground leading-none!">send</mat-icon>
    </button>



  </div>

</p-card>
